# Webconfig Demo Configuration
# Run: webconfig config.toml --schema schema.json

[server]
host = "0.0.0.0"
port = 8080
debug = true

[database]
url = "postgresql://localhost:5432/mydb"
pool_size = 10
timeout = 30

[logging]
level = "info"
file = "/var/log/app.log"
format = "json"

[features]
names = ["auth", "api", "webhooks"]
enabled = true
max_items = 100

[api]
base_url = "https://api.example.com/v2"
rate_limit = 1000
retry_attempts = 3
timeout_seconds = 30.0

[cache]
enabled = true
ttl_seconds = 300
max_entries = 10000
backend = "redis"

[[servers]]
name = "primary"
host = "10.0.0.1"
port = 443

[[servers]]
name = "backup"
host = "10.0.0.2"
port = 443

[[servers]]
name = "staging"
host = "10.0.0.3"
port = 8080
