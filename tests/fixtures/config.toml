[server]
host = "0.0.0.0"
port = 8080
debug = true

[database]
url = "postgresql://localhost:5432/mydb"
pool_size = 10
timeout = 30

[logging]
level = "info"
file = "/var/log/app.log"
format = "json"

[features]
names = ["auth", "api", "webhooks"]
enabled = true
max_items = 100

[[servers]]
name = "primary"
host = "10.0.0.1"
port = 443

[[servers]]
name = "backup"
host = "10.0.0.2"
port = 443
